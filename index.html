<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Railway POS Ticket System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-blue-900 text-white min-h-screen p-4">
    <div id="app">
        <!-- Header -->
        <header class="text-center mb-6 border-b-2 border-blue-700 pb-4">
            <h1 class="text-4xl font-bold mb-2 text-yellow-300">INDIAN RAILWAYS</h1>
            <h2 class="text-2xl mb-4">Passenger Ticket System</h2>
            <p class="text-lg mb-2">Counter ID: C01</p>
            <p id="clock" class="text-xl font-mono"></p>
        </header>

        <!-- Booking Panel -->
        <div class="bg-blue-800 p-6 rounded-lg mb-6 shadow-lg">
            <h3 class="text-2xl font-semibold mb-6 text-center">Booking Details</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Transport Type</label>
                    <select id="transport" class="w-full p-3 bg-blue-700 rounded-lg text-lg">
                        <option>Train</option>
                        <option>Local</option>
                        <option>Metro</option>
                        <option>Bus</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">From Station</label>
                    <select id="from" class="w-full p-3 bg-blue-700 rounded-lg text-lg"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">To Station</label>
                    <select id="to" class="w-full p-3 bg-blue-700 rounded-lg text-lg"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Passenger Type</label>
                    <select id="ptype" class="w-full p-3 bg-blue-700 rounded-lg text-lg">
                        <option>Adult</option>
                        <option>Child</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold mb-2">Passengers Count</label>
                    <div class="flex items-center justify-center gap-4">
                        <button id="minus" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-lg text-xl font-bold">-</button>
                        <span id="count" class="text-3xl font-bold">1</span>
                        <button id="plus" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg text-xl font-bold">+</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Ticket Price (₹ per person)</label>
                    <input type="number" id="price" value="180" min="0" step="1" class="w-full p-3 bg-blue-700 rounded-lg text-lg">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Total Fare (₹)</label>
                    <input type="number" id="total" readonly class="w-full p-3 bg-gray-700 rounded-lg text-lg font-bold">
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row justify-center gap-4 mb-6">
            <button id="generate" class="bg-green-600 hover:bg-green-700 px-8 py-4 rounded-lg text-xl font-bold shadow-lg">Generate Ticket</button>
            <button id="clear" class="bg-yellow-600 hover:bg-yellow-700 px-8 py-4 rounded-lg text-xl font-bold shadow-lg">Clear</button>
            <button id="print" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-lg text-xl font-bold shadow-lg" disabled>Print Ticket</button>
        </div>

        <!-- Ticket Preview -->
        <div id="preview" class="hidden bg-white text-black rounded-lg shadow-xl overflow-hidden">
            <div id="ticket" class="ticket p-4">
                <!-- Dynamic ticket content -->
            </div>
            <canvas id="qrcode" class="mx-auto my-4 block" width="100" height="100"></canvas>
        </div>
    </div>

    <script src="stations.js"></script>
    <script src="script.js"></script>
</body>
</html>
